<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="../Pages/todo.css">

</head>

<body>


    <!-- ----------------------------Code of todo ----------------------------------------------->


    <section class="gradient-custom-2">
        <div class="container mt-4">
            <div class="d-flex justify-content-center align-items-center flex-column">

                <div class="d-flex justify-content-between w-100 align-items-center">
                    <div></div>
                    <div class="text-success fw-bold fs-2 mt-3">ToDo App</div>
                    <div>

                        <a class="nav-link active fw-bold text-success" data-bs-toggle="offcanvas"
                            data-bs-target="#offcanvasRight" aria-controls="offcanvasRight" aria-current="page"
                            href="../index.html">⚫Info</a>

                        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight"
                            aria-labelledby="offcanvasRightLabel">
                            <div class="offcanvas-header align-items-center">
                                <h5 class="offcanvas-title text-primary" id="offcanvasRightLabel"> UserProfile</h5>
                                <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"
                                    aria-label="Close"></button>
                            </div>
                            <div class="offcanvas-body d-flex flex-column justify-content-between">

                                <div>

                                    <div class=" d-flex align-items-center flex-column">
                                        <div  class="profile-img  text-center" onclick="inputInvoke()" >
                                      <input type="file" onchange="uploadProfilePic(event)" id="fileInput" class="d-none" >
                                      <img src="" id="profileImage1" alt="">
                                  </div>
                                        <div class="fw-bold my-2 text-uppercase" id="name">Noman</div>

                                    </div>
                                    <div class="mt-2 container">
                                        <div class="mb-3 row">
                                            <label for="email" class="col-3 col-form-label fw-bold">Email ➡</label>
                                            <div class="col-9">
                                                <input type="text" class="form-control-plaintext" id="email"
                                                    value="email@example.com">
                                            </div>
                                        </div>
                                        <div class="mb-3 row">
                                            <label for="gender" class="col-3 col-form-label fw-bold">Gender➡</label>
                                            <div class="col-7 d-flex align-items-center">
                                                <input type="text"
                                                    style="background-color: transparent; border: none; outline: none;"
                                                    value="Male" class="form-control-plaintext" id="gender" />
                                            </div>

                                        </div>
                                    </div>

                                </div>

                                <div class="d-flex justify-content-center">
                                    <button onclick="logoutBtn()" class="btn btn-outline-danger btnMS ">Signout</button>
                                </div>


                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex flex-wrap mt-4 gap-4 justify-content-center align-items-center">
                    <div class="listpanel">
                        <input type="text" id="input" class="form-control btn btn-outline-light"
                            placeholder="Enter Your Task">
                    </div>

                    <div>
                        <button onclick="addTodo()" id="additems" class="btn btn-outline-success btnMS">Add
                            Task</button>
                        <button onclick="deleteAllTodo()" id="deleteall" class="btn btn-outline-danger btnMS">Delete
                            All</button>
                        </div>
                    </div>
                </div>
                <ul class="parent my-4 p-4 list-group-numbered fw-bold">
                    <!-- list dynamic -->
                </ul>
                <div class="d-flex justify-content-center ">
                <!-- <input type="file" onchange="inputImg(this)" class=" align-items-center"> -->
            </div>
            </div>

    </section>
</body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js">
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js">
</script>
<script src="../JS/app.js" type="module"></script>

</html>
