<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

<body>
    

    <div class="container">
        <div class="signup-form">
          <h1>Sign Up</h1>
          <input type="text" class="input-field" id="fullName" placeholder="Full name">
          <input type="email" class="input-field" id="email"placeholder="Email">
          <input type="password" class="input-field" id="password" placeholder="Password">
          <input type="text" class="input-field" id="gender" placeholder="Gender">
          <button class="signup-button" onclick="signUpHandler()">Sign Up</button>
          
          <span class="login-btn">Already registerd? <a href="../Pages/login.html">Login</a></span>
           
       </div>
      </div>
</body>
